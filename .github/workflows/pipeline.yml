name: Supply Chain Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-sign-attest-validate:
    runs-on: [self-hosted]
    permissions:
      contents: read
      packages: write
      id-token: write 
    steps:
      - name: Checkout
        uses: actions/checkout@v3
          
      - name: Login to GHCR
        run: |
          docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} -p "${{ secrets.GHCR_PAT }}"

      - name: Build image
        run: docker build -t ghcr.io/${{ github.repository }}:latest ./app

      - name: Push image
        run: docker push ghcr.io/${{ github.repository }}:latest

      - name: Get digest
        id: digest
        run: |
          $digest = docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/${{ github.repository }}:latest
          "digest=$digest" >> $env:GITHUB_OUTPUT

      - name: Sign and attest all digests
        run: |
          $repo = "ghcr.io/${{ github.repository }}:latest"
          $repoDigests = docker inspect --format='{{range .RepoDigests}}{{println .}}{{end}}' $repo
          $repoDigests | Out-File -FilePath repo-digests.txt -Encoding utf8
          $repoDigests = Get-Content repo-digests.txt
          foreach ($fullDigest in $repoDigests) {
            $imageRef = $fullDigest.Trim()
            if ($imageRef -eq '') { continue }
            Write-Host "Signing $imageRef"
            cosign sign --yes $imageRef
            $sha = ($imageRef -split "@sha256:")[1]
            $provenance = @{
              _type = "https://in-toto.io/Statement/v0.1"
              predicateType = "https://slsa.dev/provenance/v0.2"
              subject = @(
                @{
                  name = "ghcr.io/${{ github.repository }}:latest"
                  digest = @{ sha256 = $sha }
                }
              )
              predicate = @{
                buildType = "github-actions"
                builder = @{ id = "${{ github.actor }}" }
              }
            }
            $provenanceJson = $provenance | ConvertTo-Json -Depth 10
            [System.IO.File]::WriteAllText("provenance.json", $provenanceJson, [System.Text.UTF8Encoding]::new($false))
            Write-Host "Attesting $imageRef"
            cosign attest --predicate provenance.json --type slsaprovenance $imageRef
          }

      - name: Validate image
        run: |
          $policy = '{"sources": [], "publicKey": "file://cosign.pub"}'
          $policy | Out-File -FilePath policy.json -Encoding utf8
          & ec validate image `
            --image ${{ steps.digest.outputs.digest }} `
            --certificate-identity-regexp "^https://github\.com/${{ github.repository }}/.github/workflows/.*@refs/heads/main$" `
            --certificate-oidc-issuer-regexp "token\.actions\.githubusercontent\.com" `
            --rekor-url "https://rekor.sigstore.dev" `
            --policy policy.json

      - name: Configure oc from CRC
        run: |
          crc oc-env | Out-String | Invoke-Expression
          oc version --client

      - name: Login to OpenShift
        run: |
          crc oc-env | Out-String | Invoke-Expression
          oc login ${{ secrets.OPENSHIFT_API_URL }} --token=${{ secrets.OPENSHIFT_TOKEN }} --insecure-skip-tls-verify=true
          oc project ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Deploy image to OpenShift
        run: |
          crc oc-env | Out-String | Invoke-Expression
          oc apply -f k8s/service.yaml -n ${{ secrets.OPENSHIFT_NAMESPACE }}
          oc apply -f k8s/deployment.yaml -n ${{ secrets.OPENSHIFT_NAMESPACE }}
          oc set image deployment/demo-app demo-app=${{ steps.digest.outputs.digest }} -n ${{ secrets.OPENSHIFT_NAMESPACE }}
          oc rollout status deployment/demo-app -n ${{ secrets.OPENSHIFT_NAMESPACE }} --timeout=180s